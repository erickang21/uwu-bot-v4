name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy
        run: |
          curl -X POST https://uwubot.app/deploy \
          -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}"